---
layout: default
---

<div class="page-layout container">
  <header class="page-header reveal">
    <h1 class="page-title">{{ page.title }}</h1>
    {% if page.description %}
    <p class="page-subtitle">{{ page.description }}</p>
    {% endif %}
  </header>
  <div class="page-content reveal">
    {{ content }}
  </div>
</div>
