<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Ali Abid">
  <!-- Brand mark: serif 'A' on accent purple. Visible on both light and dark browser tabs. -->
  <rect width="64" height="64" rx="14" fill="#4F46E5"/>
  <!--
    Path-based serif 'A' so the favicon does not depend on a web font being loaded.
    Constructed for legibility at 16x16. Triangular outer with feet that flare,
    horizontal crossbar, and a single negative-space cutout for the inner triangle.
  -->
  <path fill="#FFFFFF" fill-rule="evenodd" d="
    M 28.6 13.5 L 35.4 13.5 L 49.5 51 L 42.8 51 L 39.3 41.5 L 24.7 41.5 L 21.2 51 L 14.5 51 Z
    M 26.7 36.2 L 37.3 36.2 L 32 21.8 Z
  "/>
</svg>
