<script>
  // Nav frosted-glass + scroll shadow
  (function () {
    var nav = document.getElementById('main-nav');
    if (!nav) return;
    function onScroll() {
      nav.classList.toggle('scrolled', window.scrollY > 20);
    }
    window.addEventListener('scroll', onScroll, { passive: true });
    onScroll();
  })();

  // Mobile nav toggle
  (function () {
    var toggle = document.getElementById('nav-toggle');
    var links  = document.getElementById('nav-links');
    if (!toggle || !links) return;
    toggle.addEventListener('click', function () {
      var open = links.classList.toggle('open');
      toggle.classList.toggle('open', open);
      toggle.setAttribute('aria-expanded', open);
    });
    // Close on link click
    links.querySelectorAll('a').forEach(function (a) {
      a.addEventListener('click', function () {
        links.classList.remove('open');
        toggle.classList.remove('open');
      });
    });
  })();

  // Reveal on scroll (Intersection Observer)
  (function () {
    var reveals = document.querySelectorAll('.reveal');
    if (!reveals.length) return;
    var observer = new IntersectionObserver(function (entries) {
      entries.forEach(function (e) {
        if (e.isIntersecting) {
          e.target.classList.add('visible');
          observer.unobserve(e.target);
        }
      });
    }, { threshold: 0.08 });
    reveals.forEach(function (el) { observer.observe(el); });
  })();

  // Smooth scroll for anchor links
  document.querySelectorAll('a[href^="#"]').forEach(function (anchor) {
    anchor.addEventListener('click', function (e) {
      var target = document.querySelector(this.getAttribute('href'));
      if (target) {
        e.preventDefault();
        target.scrollIntoView({ behavior: 'smooth', block: 'start' });
      }
    });
  });

  // Skill web — click to highlight a skill and show its detail popover
  (function () {
    var web    = document.querySelector('.skill-web');
    var detail = document.getElementById('skill-detail');
    if (!web || !detail) return;

    var titleEl = detail.querySelector('.skill-detail-title');
    var profEl  = detail.querySelector('.skill-detail-prof');
    var bodyEl  = detail.querySelector('.skill-detail-body');
    var closeBtn = detail.querySelector('.skill-detail-close');
    var active = null;

    function clear() {
      if (active) active.classList.remove('active');
      active = null;
      detail.classList.remove('visible');
      detail.setAttribute('hidden', '');
    }

    function show(skill) {
      if (active) active.classList.remove('active');
      active = skill;
      skill.classList.add('active');

      var name = skill.getAttribute('data-skill') || '';
      var prof = parseInt(skill.getAttribute('data-prof') || '0', 10);
      var body = skill.getAttribute('data-detail') || '';

      titleEl.textContent = name;
      profEl.innerHTML = '';
      for (var i = 1; i <= 3; i++) {
        var d = document.createElement('span');
        d.className = 'pd-dot' + (i > prof ? ' pd-dot-off' : '');
        profEl.appendChild(d);
      }
      bodyEl.textContent = body;

      detail.removeAttribute('hidden');
      // next frame for transition
      requestAnimationFrame(function () { detail.classList.add('visible'); });
    }

    web.querySelectorAll('.skill').forEach(function (skill) {
      skill.addEventListener('click', function (e) {
        e.stopPropagation();
        if (active === skill) clear();
        else show(skill);
      });
    });

    closeBtn.addEventListener('click', clear);
    document.addEventListener('click', function (e) {
      if (!detail.contains(e.target) && !e.target.closest('.skill')) clear();
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') clear();
    });
  })();
</script>
